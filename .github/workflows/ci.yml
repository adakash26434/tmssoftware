name: CI — Validate & Mirror

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-php:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: none

      - name: Check PHP syntax (all .php files under artifacts/cms)
        run: |
          set -euo pipefail
          ERRORS=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file" || true
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find artifacts/cms -name "*.php" -print0)
          if [[ $ERRORS -gt 0 ]]; then
            echo "::error::PHP syntax check failed: $ERRORS file(s) have errors."
            exit 1
          fi
          echo "PHP syntax check passed — no errors found."

  confirm-sync:
    name: Confirm GitHub Sync
    runs-on: ubuntu-latest
    needs: validate-php
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log mirror details
        run: |
          echo "✅ Mirror confirmed — GitHub is up to date."
          echo "Commit : $(git log -1 --oneline)"
          echo "Author : $(git log -1 --format='%an <%ae>')"
          echo "Branch : ${{ github.ref_name }}"
          echo "Time   : $(date -u)"
